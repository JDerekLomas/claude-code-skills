<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Deck Name</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0a08;
      --text: #f5f5f5;
      --muted: rgba(255,255,255,0.7);
      /* CUSTOMIZE: Add category colors */
      --category-1: #81D4FA;
      --category-2: #F48FB1;
      --category-3: #A5D6A7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(to bottom, #1a1612, var(--bg));
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 3.5rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 1.4rem;
      font-style: italic;
      color: var(--muted);
      max-width: 600px;
      margin: 0 auto;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 20px;
      background: rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text);
      padding: 10px 20px;
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    nav button:hover, nav button.active {
      background: rgba(255,255,255,0.2);
    }

    section {
      padding: 40px 0;
    }

    h2 {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 0.05em;
    }

    /* Rules Section */
    #rules {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .rules-content h3 {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      margin: 40px 0 15px;
      color: var(--category-3);
    }

    .rules-content p {
      margin-bottom: 15px;
      font-size: 1.1rem;
    }

    .rules-content ul, .rules-content ol {
      margin: 15px 0 15px 30px;
      font-size: 1.1rem;
    }

    .rules-content li {
      margin-bottom: 8px;
    }

    .script-box {
      background: rgba(255,255,255,0.05);
      border-left: 4px solid var(--category-3);
      padding: 20px 25px;
      margin: 20px 0;
      font-style: italic;
      font-size: 1.2rem;
    }

    /* Card Grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      padding: 20px;
    }

    .card-item {
      cursor: pointer;
      transition: transform 0.3s;
    }

    .card-item:hover {
      transform: scale(1.03);
    }

    .card-item img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .card-item p {
      text-align: center;
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal img {
      max-height: 95vh;
      max-width: 95vw;
      border-radius: 20px;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 3rem;
      color: white;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Card Deck Name</h1>
    <p class="tagline">Brief description of what this deck is for</p>
  </header>

  <nav>
    <button data-cat="rules" class="active">How to Play</button>
    <button data-cat="all">All Cards</button>
    <!-- CUSTOMIZE: Add category buttons -->
    <button data-cat="category_1">Category 1</button>
    <button data-cat="category_2">Category 2</button>
  </nav>

  <main class="container">
    <!-- Rules Section -->
    <section id="rules">
      <div class="rules-content">
        <h2>How to Play</h2>

        <h3>Overview</h3>
        <p>Describe the deck and its purpose.</p>

        <h3>Setup</h3>
        <ol>
          <li>Step one</li>
          <li>Step two</li>
        </ol>

        <h3>Gameplay</h3>
        <p>Explain the core gameplay.</p>

        <div class="script-box">
          Optional script or formula players follow...
        </div>
      </div>
    </section>

    <!-- All Cards Section -->
    <section id="all" class="hidden">
      <h2>All Cards</h2>
      <div class="card-grid" id="all-grid"></div>
    </section>

    <!-- Category Sections -->
    <section id="category_1" class="hidden">
      <h2>Category 1</h2>
      <div class="card-grid" id="category_1-grid"></div>
    </section>

    <section id="category_2" class="hidden">
      <h2>Category 2</h2>
      <div class="card-grid" id="category_2-grid"></div>
    </section>
  </main>

  <div class="modal" id="modal">
    <span class="modal-close">&times;</span>
    <img src="" alt="Card">
  </div>

  <footer>
    <p>Footer text here</p>
  </footer>

  <script>
    // CUSTOMIZE: Card data
    const cards = {
      category_1: [
        { id: 'card-01', name: 'Card Name 1' },
        { id: 'card-02', name: 'Card Name 2' },
      ],
      category_2: [
        { id: 'card-03', name: 'Card Name 3' },
        { id: 'card-04', name: 'Card Name 4' },
      ],
    };

    // Populate card grids
    const allGrid = document.getElementById('all-grid');

    Object.keys(cards).forEach(category => {
      const grid = document.getElementById(`${category}-grid`);

      cards[category].forEach(card => {
        // Add to category grid
        if (grid) {
          const div = document.createElement('div');
          div.className = 'card-item';
          div.innerHTML = `
            <img src="cards/${card.id}.png" alt="${card.name}" loading="lazy">
            <p>${card.name}</p>
          `;
          div.onclick = () => openModal(`cards/${card.id}.png`);
          grid.appendChild(div);
        }

        // Add to all cards grid
        if (allGrid) {
          const div = document.createElement('div');
          div.className = 'card-item';
          div.innerHTML = `
            <img src="cards/${card.id}.png" alt="${card.name}" loading="lazy">
            <p>${card.name}</p>
          `;
          div.onclick = () => openModal(`cards/${card.id}.png`);
          allGrid.appendChild(div);
        }
      });
    });

    // Navigation
    const navButtons = document.querySelectorAll('nav button');
    const sections = document.querySelectorAll('section');

    navButtons.forEach(btn => {
      btn.onclick = () => {
        const cat = btn.dataset.cat;
        navButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        sections.forEach(s => s.classList.add('hidden'));
        document.getElementById(cat).classList.remove('hidden');
      };
    });

    // Modal
    const modal = document.getElementById('modal');
    const modalImg = modal.querySelector('img');

    function openModal(src) {
      modalImg.src = src;
      modal.classList.add('active');
    }

    modal.onclick = () => modal.classList.remove('active');
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') modal.classList.remove('active');
    });
  </script>
</body>
</html>
